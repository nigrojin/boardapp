# 이 파일에 환경변수(이 앱에서 사용하는 변수)를 작성합니다.

# 이 앱의 이름
spring.application.name=boardapp

# 데이터베이스 연결설정

# 데이터베이스 주소(URL): localhost:3306(이 컴퓨터의 3306번 포트)
# boardapp_db: 우리 데이터베이스의 이름. createDatabaseIfNotExist(이 데이터베이스가 없으면 만들어라)
spring.datasource.url=jdbc:mysql://localhost:3306/boardapp_db?createDatabaseIfNotExist=true
# 데이터베이스 관리자(root) 아이디 & 비밀번호
spring.datasource.username=root
spring.datasource.password=1234
# MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# MyBatis 설정
# 매퍼 파일(.xml)의 위치를 지정해줍니다
mybatis.mapper-locations=classpath:mappers/**/*.xml
# 스네이크 케이스(데이터베이스)를 카멜 케이스(서버)로 변환합니다
mybatis.configuration.map-underscore-to-camel-case=true


# sql 설정: resource에 schema.sql파일을 저장할 겁니다. 서버가 시작될 때 schema.sql을 항상 실행하라는 뜻
# 서버를 시작할 때 실행해야할 sql문이 있는 경우 활용합니다. 예) 테이블 생성 등
spring.sql.init.mode=always


# 타임리프 캐싱 설정: 개발 과정에서는 타임리프의 캐싱 기능을 끕니다
spring.thymeleaf.cache=false

